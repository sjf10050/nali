name: Go Release
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Check out code
        uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests
        run: go test -race ./...

  release-binary:
    name: Release Binary
    needs: [verify]
    runs-on: ubuntu-latest
    environment: s3
    permissions:
      contents: write
    strategy:
      fail-fast: true
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build all release artifacts
        env:
          NAME: nali
          BINDIR: bin
        run: |
          mkdir -p bin
          make -j8 all-arch releases sha256sum

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to artifact storage
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: bin/
          retention-days: 30

      - name: Upload to S3
        if: secrets.S3_BUCKET != ''
        run: sh .github/scripts/upload_s3.sh
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}

  release-aur-bin:
    name: Release AUR Binary Package
    needs: [release-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF##*/v}" >> "$GITHUB_OUTPUT"

      - name: Publish to AUR (nali-go-bin)
        uses: zu1k/aur-publish-action@master
        with:
          package_name: nali-go-bin
          commit_username: 'zu1k'
          commit_email: 'i@zu1k.com'
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          new_release: ${{ steps.version.outputs.version }}

  release-aur-git:
    name: Release AUR Git Package
    needs: [release-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF##*/v}" >> "$GITHUB_OUTPUT"

      - name: Publish to AUR (nali-go-git)
        uses: zu1k/aur-publish-action@master
        with:
          package_name: nali-go-git
          commit_username: 'zu1k'
          commit_email: 'i@zu1k.com'
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          new_release: ${{ steps.version.outputs.version }}

  release-aur-src:
    name: Release AUR Source Package
    needs: [release-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF##*/v}" >> "$GITHUB_OUTPUT"

      - name: Publish to AUR (nali-go)
        uses: zu1k/aur-publish-action@master
        with:
          package_name: nali-go
          commit_username: 'zu1k'
          commit_email: 'i@zu1k.com'
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          new_release: ${{ steps.version.outputs.version }}
