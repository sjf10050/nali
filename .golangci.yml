version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - errcheck
    - exhaustive
    - govet
    - ineffassign
    - misspell
    - nilerr
    - revive
    - gosec
    - sqlclosecheck
    - staticcheck
    - unused
  settings:
    revive:
      rules:
        - name: exported
          disabled: false
        - name: blank-imports
        - name: context-as-argument
        - name: unused-parameter
    exhaustive:
      default-signifies-exhaustive: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
